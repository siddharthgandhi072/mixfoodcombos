<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — MIX</title>
  <meta name="description" content="Create a free MIX account to post and comment." />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body data-page="signup">
  <div id="nav-placeholder"></div>
  <div id="page-message" class="page-message" hidden></div>

  <main class="auth-page">
    <img src="assets/svg/herb-sprig.svg" class="doodle auth-doodle-1" alt="" />
    <img src="assets/svg/tomato.svg" class="doodle auth-doodle-2" alt="" />

    <form class="form-card" id="signup-form">
      <h1>Create your account</h1>

      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" minlength="3" maxlength="24" required />
        <p class="field-hint">Shown on everything you post. Must be unique.</p>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" minlength="6" required />
        <p class="field-hint">At least 6 characters. Stored securely — nobody can view it, including us.</p>
      </div>

      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" name="confirm" minlength="6" required />
      </div>

      <button type="submit" class="btn btn-primary" id="signup-submit">Create account</button>
      <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
    </form>
  </main>

  <footer class="site-footer">
    <p>MIX — Meals Invented by Xperimenting</p>
  </footer>

  <script type="module" src="js/nav.js"></script>
  <script type="module">
    import { signUp } from "./js/auth.js";
    import { showMessage, friendlyAuthError } from "./js/utils.js";

    const form = document.getElementById("signup-form");
    const submitBtn = document.getElementById("signup-submit");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirm").value;

      if (!/^[a-zA-Z0-9_]+$/.test(username)) {
        showMessage("Usernames can only contain letters, numbers, and underscores.");
        return;
      }
      if (password !== confirm) {
        showMessage("Passwords don't match.");
        return;
      }

      submitBtn.disabled = true;
      try {
        await signUp(email, username, password);
        window.location.href = "account.html";
      } catch (error) {
        if (error.message === "username-taken") {
          showMessage("That username is already taken — please pick another.");
        } else {
          showMessage(friendlyAuthError(error));
        }
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
